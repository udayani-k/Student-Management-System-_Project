<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Marks History</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/markslist.css">

</head>

<body>

<div class="marks-container">

    <h1>Marks History</h1>

    <table class="marks-table">

        <thead>

            <tr>

                <th>Student ID</th>
                <th>Student Name</th>
                <th>Department</th>

                <th>HTML</th>
                <th>CSS</th>
                <th>JavaScript</th>
                <th>React</th>
                <th>Node.js</th>

                <th>Total</th>
                <th>Percentage</th>
                <th>Grade</th>
                <th>Rank</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody id="marksTableBody">

        </tbody>

    </table>

    <div class="bottom-buttons">

        <button onclick="window.location.href='marks.html'">
            Back to Marks
        </button>

        <button onclick="window.location.href='dashboard.html'">
            Back to Dashboard
        </button>

    </div>

</div>

<script src="js/markslist.js"></script>

</body>
</html>
