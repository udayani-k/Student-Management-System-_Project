<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="dashboard-wrapper">

    <div class="dashboard">

        <h1>Student Management Portal</h1>

        <h2 id="welcome"></h2>
        <div class="top-info">

    <div class="info-card">
        <h3>User</h3>
        <p id="loggedUser"></p>
    </div>

    <div class="info-card">
        <h3>Date</h3>
        <p id="currentDate"></p>
    </div>

    <div class="info-card">
        <h3>Time</h3>
        <p id="currentTime"></p>
    </div>

</div>

<div class="dashboard-stats">

    <div class="card">
        <h3>Total Students</h3>
        <p id="totalStudents">0</p>
    </div>

    <div class="card">
        <h3>Total Departments</h3>
        <p id="totalDepartments">0</p>
    </div>

    <div class="card">
        <h3>Present Students</h3>
        <p id="presentStudents">0</p>
    </div>

    <div class="card">
        <h3>Absent Students</h3>
        <p id="absentStudents">0</p>
    </div>

    <div class="card">
        <h3>Highest Scoring Student</h3>
        <p id="highestStudent">Not Available</p>
    </div>

    <div class="card">
        <h3>Recent Student</h3>
        <p id="recentStudent">Not Available</p>
    </div>

</div>
        <div class="menu">
           
             <button onclick="window.location.href='dashboard.html'">Dashboard</button>

<button onclick="openStudents()">Student Profile</button>



            <button onclick="openAttendance()">Attendance</button>

            <button onclick="openMarks()">Marks</button>

            <button onclick="openReports()">Reports</button>
            <button onclick="openSettings()">Settings</button>
            <button onclick="openAbout()">About</button>

             <button onclick="openContact()">Contact</button>
            <button class="logout" onclick="logout()">Logout</button>
            </div> 

        

    </div>



    </script>
  <script src="js/theme.js"></script>  
<script src="js/dashboard.js"></script>
</body>
</html>
